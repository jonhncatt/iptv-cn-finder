name: Update IPTV Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: update-iptv-playlist
  cancel-in-progress: false

env:
  MIN_CHANNEL_COUNT: "60"
  MIN_CHANNEL_RATIO_PERCENT: "85"

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffprobe
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Refresh verified playlist
        run: |
          python3 find_cn_streams.py --ffprobe --probe-environment cloud --limit 0 --timeout 14 --workers 12 --retries 2 --keep-failures --verbose

      - name: Guard published playlist quality
        run: |
          previous_count=0
          if [ -f m3u/chinese-public-verified.m3u ]; then
            previous_count=$(grep -c '^#EXTINF' m3u/chinese-public-verified.m3u)
          fi
          generated_count=$(python3 - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("output/chinese-public-report.json").read_text(encoding="utf-8"))
          print(int(report.get("success_count", 0)))
          PY
          )
          ratio_floor=$(( previous_count * MIN_CHANNEL_RATIO_PERCENT / 100 ))
          required_count=$MIN_CHANNEL_COUNT
          if [ "$ratio_floor" -gt "$required_count" ]; then
            required_count=$ratio_floor
          fi
          echo "previous_count=$previous_count"
          echo "generated_count=$generated_count"
          echo "required_count=$required_count"
          if [ "$generated_count" -lt "$required_count" ]; then
            echo "Generated playlist is below the safety floor; refusing to overwrite published files."
            exit 1
          fi

      - name: Copy refreshed outputs
        run: |
          mkdir -p m3u
          mkdir -p state
          cp output/chinese-public-verified.m3u m3u/chinese-public-verified.m3u
          cp output/chinese-public-with-backups.m3u m3u/chinese-public-with-backups.m3u
          cp output/chinese-public-repair.m3u m3u/chinese-public-repair.m3u
          cp output/chinese-public-report.json m3u/chinese-public-report.json

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add m3u/chinese-public-verified.m3u m3u/chinese-public-with-backups.m3u m3u/chinese-public-repair.m3u m3u/chinese-public-report.json state/probe-history.json
          if git diff --cached --quiet; then
            echo "No playlist changes to commit."
            exit 0
          fi
          git commit -m "Update verified IPTV playlist"
          git push
